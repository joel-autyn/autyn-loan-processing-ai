    <!-- Structured data: FAQPage (keep in sync with src/components/sections/FAQSection.tsx) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Autyn?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Autyn is an AI-native loan processing platform built specifically for independent mortgage brokers. It extracts documents, calculates FNMA-eligible income, identifies conditions, and packages underwriter-ready loan files — reducing a 2–4 hour pre-approval workflow to roughly 10 minutes per loan."
          }
        },
        {
          "@type": "Question",
          "name": "Who is Autyn built for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Autyn is built for independent mortgage brokers, broker networks, and small-to-mid-sized non-bank lenders in the U.S. broker channel. If you originate loans and currently pay a third-party loan processor, Autyn is designed for you. It is not a lender-side underwriting tool."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Autyn cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AI pre-approvals are free and unlimited. Full end-to-end processing is $500 per closed file, which replaces the $800–$1,200 most brokers pay third-party processors. There are no seat fees, no FTE costs, and pricing scales linearly with volume."
          }
        },
        {
          "@type": "Question",
          "name": "How is Autyn different from Encompass, LendingPad, Blend, or Friday Harbor?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Encompass, LendingPad, and Blend are legacy lender-first LOS/POS platforms with manual workflows. Friday Harbor and tidalwave build AI for the lender underwriter side. Ocrolus and Floify solve single points. Autyn is the only end-to-end AI-native platform built for the broker channel, combining pre-approval and full processing in one broker-first workflow with full explainability."
          }
        },
        {
          "@type": "Question",
          "name": "How does Autyn calculate borrower income?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Autyn extracts pay stubs, W-2s, tax returns, bank statements, and other source documents, then calculates eligible income against Fannie Mae and Freddie Mac guidelines plus your wholesale lender's overlays. It handles salaried, self-employed, commission, variable, and rental income, and surfaces every number with its source for audit."
          }
        },
        {
          "@type": "Question",
          "name": "Is Autyn compliant with FNMA and Freddie Mac guidelines?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Autyn's income and eligibility logic is built around current Fannie Mae Selling Guide and Freddie Mac Seller/Servicer Guide requirements, and it supports lender-specific overlays. Every decision is logged with a full audit trail, and Autyn supports RESPA, TILA, and MISMO-standard outputs."
          }
        },
        {
          "@type": "Question",
          "name": "Does Autyn replace my LOS or CRM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Autyn is designed to work alongside your existing LOS and CRM. It integrates with leading broker LOS platforms, supports MISMO XML export, and offers an API. There is no rip-and-replace — Autyn sits between your intake and your underwriter handoff."
          }
        },
        {
          "@type": "Question",
          "name": "How long does implementation take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most design-partner firms start running free AI pre-approvals on day one. A typical pilot runs 5–10 loan files to prove roughly 40% faster processing and $300 per loan in savings before expanding to the broader firm."
          }
        },
        {
          "@type": "Question",
          "name": "How do I get started with Autyn?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can start free AI pre-approvals immediately, or book a 15-minute demo at autyn.ai/demo. Autyn's founding team — including a licensed Mortgage Loan Officer — onboards every design partner personally."
          }
        }
      ]
